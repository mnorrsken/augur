apiVersion: apps/v1
kind: Deployment
metadata:
  name: augur-extender
  namespace: augur
  labels:
    app: augur-extender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: augur-extender
  template:
    metadata:
      labels:
        app: augur-extender
    spec:
      containers:
        - name: extender
          image: augur-extender:latest
          ports:
            - containerPort: 8888
              name: http
          env:
            - name: AUGUR_LISTEN_ADDR
              value: ":8888"
            - name: AUGUR_AGENT_ADDR
              value: "augur-agent.augur.svc.cluster.local:50051"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: augur-extender
  namespace: augur
spec:
  selector:
    app: augur-extender
  ports:
    - port: 8888
      targetPort: http
      protocol: TCP
